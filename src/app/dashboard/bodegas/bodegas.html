<div class="page-header">
    <div class="header-titles">
        <h2>Inventario y Bodegas</h2>
        <p>Gestiona los puntos de almacenamiento de tus productos.</p>
    </div>
    
    <!-- 🔥 BOTÓN CREAR (Solo para el PROPIETARIO) -->
    <button *ngIf="rolUsuario === 'PROPIETARIO'" class="btn-primary" (click)="abrirModalCrear()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Nueva Bodega
    </button>
</div>

<!-- 🔥 BUSCADOR -->
<div class="search-container fade-in">
    <div class="search-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" placeholder="Buscar por nombre o dirección..." 
               [(ngModel)]="terminoBusqueda" (keyup.enter)="buscarBodegas()" (input)="terminoBusqueda === '' ? cargarBodegas() : null">
    </div>
    <button class="btn-secondary" (click)="buscarBodegas()">Buscar</button>
</div>

<div *ngIf="isLoading" class="loading-container" style="background: white; border-radius: 20px; margin-top: 20px; padding: 60px 0;">
    <div class="spinner"></div>
    <p>Cargando información de bodegas...</p>
</div>

<!-- 🔥 GRID DE BODEGAS -->
<div *ngIf="!isLoading" class="fade-in mt-4">
    <div class="team-grid">
        
        <!-- ESTADO VACÍO -->
        <div *ngIf="bodegas.length === 0" class="empty-state">
            <div class="empty-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            </div>
            <p>No se encontraron bodegas registradas.</p>
        </div>

        <!-- TARJETAS -->
        <div class="bodega-card" *ngFor="let bodega of bodegas">
            <div class="bodega-icon-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            </div>
            
            <div class="bodega-info">
                <h4>{{ bodega.nombre }}</h4>
                <p class="address-text">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    {{ bodega.direccion || 'Sin dirección registrada' }}
                </p>
                <div class="bodega-id">ID Bodega: #{{ bodega.id }}</div>
            </div>

            <!-- 🔥 ACCIONES (Solo visibles para PROPIETARIO) -->
            <div class="bodega-actions" *ngIf="rolUsuario === 'PROPIETARIO'">
                <button class="btn-action edit" (click)="abrirModalEditar(bodega)" title="Editar Bodega">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                </button>
                <button class="btn-action delete" (click)="eliminarBodega(bodega.id)" title="Eliminar Bodega">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                </button>
            </div>
        </div>
    </div>
</div>
